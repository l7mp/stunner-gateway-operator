name: Test

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths-ignore:
      - '**.md'
    tags-ignore:
      - '*'
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Golang Environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run Tests
        run: make test
  sec-check:
    name: Security Check
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Check security vulnerabilites
        uses: anchore/scan-action@v7
        with:
          path: "."
          fail-build: true
          severity-cutoff: critical
